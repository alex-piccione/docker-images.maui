name: MAUI .net 10 Docker image (Windows 2025)

on:  
  workflow_dispatch:        # manual trigger only

env:
  DOCKERHUB_USERNAME: alessandropiccione
  IMAGE_NAME: maui-dotnet10-windows-2025
  DOCKERFILE: Dockerfile_net10
  VERSION: 0.1

jobs:
  build-and-push:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      #- name: Log in to Docker Hub
      #  uses: docker/login-action@v3
      #  with:
      #    username: ${{ env.DOCKERHUB_USER }}
      #    password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PAT }}" | docker login -u "${{ env.DOCKERHUB_USERNAME }}" --password-stdin


      - name: Build Docker image
        run: |
          docker build --platform windows/amd64 `
            -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} `
            -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest `
            -f ${{ env.DOCKERFILE }} `
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

