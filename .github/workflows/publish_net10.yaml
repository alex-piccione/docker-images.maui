name: MAUI Docker Image

on:
  push:
    branches: [ main ]

env:
  DOCKERHUB_USER: alessandropiccione
  IMAGE_NAME: maui-dotnet10-windows
  DOCKERFILE: Dockerfile_net10
  VERSION: 0.1

jobs:
  build-and-push:
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Build Docker image
        run: |
          docker build --platform windows/amd64 `
            -t ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} `
            -t ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest `
            -f ${{ env.DOCKERFILE }}
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          docker push ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest